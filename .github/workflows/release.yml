name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Test and build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Check out AbstractFramework
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)." >&2
            exit 1
          fi
          if ! grep -q "## \\[$PKG_VERSION\\]" CHANGELOG.md; then
            echo "CHANGELOG.md has no entry for $PKG_VERSION." >&2
            exit 1
          fi

      - name: Install package without dependency stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e . --no-deps

      - name: Test
        run: python -m pytest -q

      - name: Build distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/abstractframework/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
